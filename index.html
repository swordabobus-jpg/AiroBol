<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AiroBol</title>
    <style>
        /* ОСНОВНОЙ СТИЛЬ - ГОРИЗОНТАЛЬНО */
        body { margin: 0; overflow: hidden; font-family: 'Arial Black', sans-serif; color: white; touch-action: none; background: #87CEEB; }
        
        /* ФОН ИЗ ОБЛАКОВ (КАРТИНКА НА ВЕСЬ ЭКРАН) */
        .background { 
            position: fixed; width: 100vw; height: 100vh; 
            background: url('https://img.freepik.com') no-repeat center center; 
            background-size: cover; z-index: -1; 
        }

        /* ПРОФИЛЬ В УГЛУ */
        .profile { position: absolute; top: 10px; left: 10px; display: flex; align-items: center; background: rgba(0,0,0,0.4); padding: 5px 15px; border-radius: 30px; backdrop-filter: blur(5px); border: 2px solid rgba(255,255,255,0.3); }
        .ava { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; background: #555; }
        .info { margin-left: 10px; font-size: 14px; }

        /* ГЛАВНОЕ МЕНЮ */
        .container { display: flex; align-items: center; justify-content: center; height: 100vh; gap: 40px; }
        .btn-circle { width: 80px; height: 80px; border-radius: 50%; border: none; background: #1E88E5; color: white; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px #1565C0; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .play-btn { width: 130px; height: 130px; font-size: 60px; background: #1E88E5; }

        /* ВТОРОЕ МЕНЮ (РЕЖИМЫ) */
        #modeMenu { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); align-items: center; justify-content: center; gap: 20px; z-index: 20; }
        .rect-btn { width: 180px; height: 80px; border-radius: 20px; border: none; background: #1E88E5; color: white; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 5px #1565C0; }
        .ranked-btn { background: #FFD700; color: #333; box-shadow: 0 5px #B8860B; }

        /* СКИНЫ */
        #skinMenu { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; background: white; border-radius: 20px; padding: 20px; text-align: center; color: #333; z-index: 30; }
        .skin-option { display: inline-block; margin: 10px; }
        .skin-circle { width: 70px; height: 70px; border-radius: 50%; margin: 0 auto 10px; border: 3px solid #ccc; }
    </style>
</head>
<body>
    <div class="background"></div>

    <!-- Профиль -->
    <div class="profile">
        <div class="ava"></div>
        <div class="info">
            <b>Bobik</b><br>
            <span style="color:#FFD700">ЭЛО: 0</span>
        </div>
    </div>

    <!-- Главные кнопки -->
    <div class="container" id="mainUI">
        <button class="btn-circle" onclick="toggleSkins(true)">СКИНЫ</button>
        <button class="btn-circle play-btn" onclick="toggleMenu(true)">»</button>
        <button class="btn-circle" onclick="alert('Настройки: RU/EN')">НАСТР.</button>
    </div>

    <!-- Меню Режимов -->
    <div id="modeMenu">
        <button class="rect-btn" onclick="alert('Игра с ботом...')">БОТ</button>
        <button class="rect-btn ranked-btn" onclick="alert('Поиск рангового боя...')">РАНГОВЫЙ</button>
        <button class="rect-btn" onclick="alert('Режим на одном телефоне')">ДРУГ</button>
        <button onclick="toggleMenu(false)" style="position:absolute; bottom:20px; color:white; background:none; border:none; font-size:18px;">← НАЗАД</button>
    </div>

    <!-- Меню Скинов -->
    <div id="skinMenu">
        <h2>ВЫБОР СКИНА</h2>
        <div class="skin-option">
            <div class="skin-circle" style="background: red;"></div>
            <b>БАЗОВЫЙ</b><br>
            <button onclick="toggleSkins(false)">ВЫБРАТЬ</button>
        </div>
        <div class="skin-option">
            <div class="skin-circle" style="background: gold; color: black; display: flex; align-items: center; justify-content: center; font-size: 10px; text-align: center;">GOLDEN BEAVER</div>
            <b>БОБЕР</b><br>
            <button disabled>1000 ЭЛО</button>
        </div>
        <br><br>
        <button onclick="toggleSkins(false)">ЗАКРЫТЬ</button>
    </div>

    <script>
        function toggleMenu(show) {
            document.getElementById('mainUI').style.display = show ? 'none' : 'flex';
            document.getElementById('modeMenu').style.display = show ? 'flex' : 'none';
        }
        function toggleSkins(show) {
            document.getElementById('skinMenu').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
