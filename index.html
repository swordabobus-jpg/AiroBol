<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, orientation=landscape">
    <title>AiroBol</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial Rounded MT Bold', sans-serif; background: #87CEEB; color: white; touch-action: none; }
        .sky { position: fixed; width: 100%; height: 100%; background: linear-gradient(#87CEEB, #E0F7FA); z-index: -1; }
        .cloud { position: absolute; background: white; border-radius: 50px; opacity: 0.8; animation: move linear infinite; }
        @keyframes move { from { transform: translateX(-200px); } to { transform: translateX(110vw); } }

        /* ПРОФИЛЬ */
        .profile { position: absolute; top: 15px; left: 15px; display: flex; align-items: center; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 35px; backdrop-filter: blur(5px); z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
        .ava { width: 45px; height: 45px; border-radius: 50%; border: 2px solid white; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* ГЛАВНОЕ МЕНЮ */
        .menu-container { display: flex; align-items: center; justify-content: center; height: 100vh; gap: 40px; }
        .btn-circle { width: 90px; height: 90px; border-radius: 50%; border: none; background: #1E88E5; color: white; font-size: 40px; cursor: pointer; box-shadow: 0 6px #1565C0; display: flex; align-items: center; justify-content: center; }
        .play-btn { width: 150px; height: 150px; font-size: 90px; background: #1E88E5; }

        /* МЕНЮ РЕЖИМОВ */
        #modeMenu { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); align-items: center; justify-content: center; gap: 20px; z-index: 20; }
        .rect-btn { width: 200px; height: 100px; border-radius: 30px; border: none; background: #1E88E5; color: white; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 6px #1565C0; }
        .ranked-btn { background: #FFD700; color: #333; box-shadow: 0 6px #B8860B; }

        /* ЭКРАН ОЖИДАНИЯ */
        #matchmaking { display: none; position: fixed; width: 100%; height: 100%; background: #1E88E5; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .loader { width: 70px; height: 70px; border: 8px solid rgba(255,255,255,0.3); border-top: 8px solid #FFD700; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="sky" id="sky"></div>

    <!-- Твой профиль в углу -->
    <div class="profile" onclick="alert('Твой ID: #7421')">
        <div class="ava">👤</div>
        <div style="margin-left:12px">
            <b id="pNick">Bobik</b><br>
            <small id="pElo">🏆 1050</small>
        </div>
    </div>

    <!-- Главные кнопки -->
    <div class="menu-container" id="mainUI">
        <button class="btn-circle" onclick="alert('Скины: Золотой Бобер 🦫 разблокирован!')">👕</button>
        <button class="btn-circle play-btn" onclick="openModes()">»</button>
        <button class="btn-circle">⚙️</button>
    </div>

    <!-- Выбор режима -->
    <div id="modeMenu">
        <button class="rect-btn" onclick="alert('Запуск игры с ботом...')">С БОТОМ</button>
        <button class="rect-btn ranked-btn" onclick="startSearch()">РАНГОВЫЙ БОЙ</button>
        <button class="rect-btn" onclick="alert('Режим на одном устройстве')">С ДРУГОМ</button>
        <button onclick="closeModes()" style="position:absolute; bottom:40px; color:white; background:none; border:none; font-size:22px; cursor:pointer;">← НАЗАД</button>
    </div>

    <!-- Поиск соперника -->
    <div id="matchmaking">
        <div class="loader"></div>
        <h2 style="margin-top:30px; letter-spacing: 2px;">ПОИСК СОПЕРНИКА...</h2>
        <p>Твой рейтинг: 1050</p>
        <button onclick="document.getElementById('matchmaking').style.display='none'" style="margin-top:40px; padding:15px 40px; background:#f44336; color:white; border:none; border-radius:15px; font-weight:bold; cursor:pointer;">ОТМЕНА</button>
    </div>

    <script>
        function openModes() { document.getElementById('modeMenu').style.display = 'flex'; }
        function closeModes() { document.getElementById('modeMenu').style.display = 'none'; }
        function startSearch() {
            closeModes();
            document.getElementById('matchmaking').style.display = 'flex';
        }

        // Плавные облака
        for(let i=0; i<7; i++) {
            let c = document.createElement('div');
            c.className = 'cloud';
            c.style.width = Math.random()*160+70+'px';
            c.style.height='45px';
            c.style.top = Math.random()*85+'vh';
            c.style.left='-220px';
            c.style.animationDuration = Math.random()*25+15+'s';
            document.getElementById('sky').appendChild(c);
        }
    </script>
</body>
</html>
